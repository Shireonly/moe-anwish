<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>awishr 管理后台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#22222f;--surface3:#2a2a3a;--border:#333348;--text:#e4e4e7;--text2:#a1a1aa;--accent:#60a5fa;--red:#ef4444;--green:#22c55e;--yellow:#eab308}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--accent),#93bbfd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .status{font-size:12px;display:flex;align-items:center;gap:4px;margin-left:auto}
.header .status .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.header .status .dot.off{background:var(--red)}
.auth-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.auth-screen .box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:340px;max-width:92vw;display:flex;flex-direction:column;gap:14px}
.auth-screen .box h2{font-size:16px;text-align:center}
.auth-screen input{background:var(--input-bg,#22222f);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:14px;outline:none}
.auth-screen input:focus{border-color:var(--accent)}
.auth-screen button{background:var(--accent);color:#fff;border:none;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.auth-screen button:hover{opacity:.85}
.dashboard{display:none;flex:1;flex-direction:column;overflow:hidden}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.toolbar .info{font-size:12px;color:var(--text2)}
.toolbar .btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s}
.toolbar .btn:hover{background:var(--surface3)}
.toolbar .btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.toolbar .btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.toolbar .badge{font-size:12px;background:var(--surface2);padding:3px 10px;border-radius:20px}
.toolbar .search-bar{display:none;flex:1;min-width:180px;position:relative}
.toolbar .search-bar.show{display:flex}
.toolbar .search-bar input{width:100%;background:var(--input-bg,#22222f);border:1px solid var(--border);color:var(--text);padding:6px 28px 6px 12px;border-radius:8px;font-size:12px;outline:none}
.toolbar .search-bar input:focus{border-color:var(--accent)}
.toolbar .search-bar .clear{position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:2px 6px}
.toolbar .search-result{font-size:11px;color:var(--text2)}
.content{flex:1;display:flex;overflow:hidden}
.panel{flex:1;display:flex;flex-direction:column;min-width:0}
.panel-header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;font-size:13px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-list,.ban-list,.msg-list{flex:1;overflow-y:auto;padding:8px}
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:all .12s}
.user-card:hover{border-color:var(--accent)}
.user-card .info{flex:1;min-width:0}
.user-card .info .name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.user-card .info .name .tag{font-size:10px;background:var(--surface2);color:var(--text2);padding:1px 8px;border-radius:10px}
.user-card .info .detail{font-size:11px;color:var(--text2);margin-top:2px}
.user-card .info .detail span{margin-right:10px}
.user-card .actions{display:flex;gap:6px;flex-shrink:0}
.user-card .actions button{padding:5px 12px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s}
.user-card .actions .ban-btn{background:var(--yellow);color:#1a1a2e}
.user-card .actions .ban-btn:hover{opacity:.8}
.user-card .actions .unban-btn{background:var(--green);color:#fff}
.user-card .actions .unban-btn:hover{opacity:.8}
.user-card .avatar{width:32px;height:32px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0}
.msg-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;font-size:12px}
.msg-item .msg-time{color:var(--text2);font-size:10px}
.msg-item .msg-room{color:var(--accent);font-weight:600}
.msg-item .msg-user{font-weight:600}
.msg-item .msg-id{font-size:10px;color:var(--text2);font-family:monospace}
.msg-item .msg-content{color:var(--text);margin-top:3px;word-break:break-all}
.msg-item .msg-flag{display:inline-block;font-size:10px;background:var(--yellow);color:#1a1a2e;padding:0 6px;border-radius:4px;margin-left:4px}
.msg-item .msg-actions{margin-top:4px}
.msg-item .del-btn{font-size:10px;background:var(--red);color:#fff;border:none;padding:2px 8px;border-radius:4px;cursor:pointer;transition:opacity .12s}
.msg-item .del-btn:hover{opacity:.7}
.ban-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ban-card .info{flex:1;min-width:0}
.ban-card .info .cid{font-size:13px;font-family:monospace;word-break:break-all}
.ban-card .info .time{font-size:11px;color:var(--text2);margin-top:2px}
.ban-card .actions .unban-btn{background:var(--green);color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.ban-card .actions .unban-btn:hover{opacity:.8}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:13px;flex-direction:column;gap:8px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 28px;border-radius:12px;font-size:14px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.15)}.toast.show{opacity:1}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="header">
  <h1>awishr 管理后台</h1>
  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">未连接</span></div>
</div>

<div class="auth-screen" id="authScreen">
  <div class="box">
    <h2>管理员登录</h2>
    <input type="password" id="pwdInput" placeholder="输入管理员密码">
    <button id="loginBtn">登录</button>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="toolbar">
    <button class="btn active" data-tab="users" id="tabUsers">在线用户</button>
    <button class="btn" data-tab="messages" id="tabMessages">消息历史</button>
    <button class="btn" data-tab="bans" id="tabBans">封禁管理</button>
    <div class="badge" id="onlineBadge">0 人在线</div>
    <span class="info" id="banCount">封禁 0 个</span>
    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="搜索消息内容或用户名...">
      <button class="clear" id="searchClear">&times;</button>
    </div>
    <span class="search-result" id="searchResult"></span>
    <div style="flex:1"></div>
    <button class="btn" id="refreshBtn">🔄 刷新</button>
    <button class="btn danger" id="logoutBtn">退出</button>
  </div>
  <div class="content">
    <!-- 在线用户 -->
    <div class="panel" id="panelUsers">
      <div class="panel-header">在线用户 <span style="color:var(--text2);font-weight:400" id="userCount">(0)</span></div>
      <div class="user-list" id="userList"><div class="empty-state">暂无在线用户</div></div>
    </div>
    <!-- 消息历史 -->
    <div class="panel" id="panelMessages" style="display:none">
      <div class="panel-header">全部消息 <span style="color:var(--text2);font-weight:400" id="msgCount">(0)</span></div>
      <div class="msg-list" id="msgList"><div class="empty-state">暂无消息</div></div>
    </div>
    <!-- 封禁管理 -->
    <div class="panel" id="panelBans" style="display:none">
      <div class="panel-header">已封禁用户 <span style="color:var(--text2);font-weight:400" id="bannedCount">(0)</span></div>
      <div class="ban-list" id="banList"><div class="empty-state">暂无封禁记录</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
var $=function(id){return document.getElementById(id)};
var ws,authed=false,allMessages=[];
var pwdI=$('pwdInput'),loginBtn=$('loginBtn'),authS=$('authScreen'),dash=$('dashboard');
var userL=$('userList'),msgL=$('msgList'),banL=$('banList'),ob=$('onlineBadge'),bc=$('banCount');
var uc=$('userCount'),mc=$('msgCount'),bdc=$('bannedCount');
var sd=$('statusDot'),st=$('statusText'),searchI=$('searchInput'),searchR=$('searchResult');
var toastEl=$('toast');
var currentTab='users';

function toast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(function(){toastEl.classList.remove('show')},2500)}

function connect(){
var host=location.host;
var wsUrl='ws://'+host+'/ws';
var hostname=location.hostname;
if(hostname!=='localhost'&&hostname!=='127.0.0.1'){
wsUrl='wss://'+host+'/ws'
}
ws=new WebSocket(wsUrl);
ws.onopen=function(){sd.className='dot';st.textContent='已连接';identify()};
ws.onmessage=function(e){handle(JSON.parse(e.data))};
ws.onclose=function(){sd.className='dot off';st.textContent='已断开';authed=false;dash.style.display='none';authS.style.display='flex';setTimeout(connect,3000)};
ws.onerror=function(){ws.close()};
setInterval(function(){if(ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'ping'}))},30000)
}

function identify(){
var cid='admin_'+Math.random().toString(36).substr(2,10);
ws.send(JSON.stringify({type:'identify',client_id:cid}))
}
function login(){
var p=pwdI.value.trim();if(!p)return;
ws.send(JSON.stringify({type:'admin_auth',password:p}))
}
loginBtn.addEventListener('click',login);
pwdI.addEventListener('keydown',function(e){if(e.key==='Enter')login()});
$('refreshBtn').addEventListener('click',function(){refreshCurrentTab()});
$('logoutBtn').addEventListener('click',function(){authed=false;dash.style.display='none';authS.style.display='flex';pwdI.value='';allMessages=[]});

// Tab switching
document.querySelectorAll('[data-tab]').forEach(function(btn){
btn.addEventListener('click',function(){
currentTab=btn.dataset.tab;
document.querySelectorAll('[data-tab]').forEach(function(b){b.classList.remove('active')});
btn.classList.add('active');
$('panelUsers').style.display=currentTab==='users'?'flex':'none';
$('panelMessages').style.display=currentTab==='messages'?'flex':'none';
$('panelBans').style.display=currentTab==='bans'?'flex':'none';
$('searchBar').classList.toggle('show',currentTab==='messages');
if(currentTab==='messages'&&allMessages.length===0)loadMessages();
if(currentTab==='bans')loadBanList();
if(currentTab==='users')ws.send(JSON.stringify({type:'admin_list'}));
});
});

// Search
var searchTimeout;
searchI.addEventListener('input',function(){
clearTimeout(searchTimeout);
searchTimeout=setTimeout(doSearch,250);
});
$('searchClear').addEventListener('click',function(){searchI.value='';doSearch()});

function doSearch(){
var kw=searchI.value.trim().toLowerCase();
if(!kw){
renderMessages(allMessages);
searchR.textContent='';
return;
}
var results=allMessages.filter(function(m){
var c=(m.content||'').toLowerCase();
var u=(m.username||'').toLowerCase();
return c.indexOf(kw)>=0||u.indexOf(kw)>=0;
});
renderMessages(results);
searchR.textContent='找到 '+results.length+' 条';
}

function loadMessages(){
ws.send(JSON.stringify({type:'admin_load_messages'}));
}

function loadBanList(){
ws.send(JSON.stringify({type:'admin_ban_list'}));
}

function refreshCurrentTab(){
if(currentTab==='users')ws.send(JSON.stringify({type:'admin_list'}));
if(currentTab==='messages')loadMessages();
if(currentTab==='bans')loadBanList();
}

function handle(d){
try{
switch(d.type){
case 'welcome':
if(authed)ws.send(JSON.stringify({type:'admin_list'}));
break;
case 'admin_auth_ok':
authed=true;authS.style.display='none';dash.style.display='flex';
ws.send(JSON.stringify({type:'admin_list'}));
toast('登录成功');
break;
case 'admin_user_list':
renderUsers(d.users||[]);
break;
case 'admin_message_history':
allMessages=d.messages||[];
renderMessages(allMessages);
mc.textContent='('+allMessages.length+')';
break;
case 'admin_search_result':
renderMessages(d.messages||[]);
break;
case 'admin_ban_list':
renderBans(d.bans||[]);
bc.textContent='封禁 '+d.bans.length+' 个';
bdc.textContent='('+d.bans.length+')';
break;
case 'unban_ok':
toast('已解封');
loadBanList();
break;
case 'admin_kick_ok':
toast('已踢出并封禁');
ws.send(JSON.stringify({type:'admin_list'}));
loadBanList();
break;
case 'delete_ok':
toast('已删除');
if(currentTab==='messages')loadMessages();
if(currentTab==='users')ws.send(JSON.stringify({type:'admin_list'}));
break;
case 'chat':
// Live update: append to message list if on messages tab
addLiveMessage(d);
break;
case 'system':
case 'room_list':
case 'pong':
break;
case 'error':
toast(d.message);
break;
}
}catch(e){console.error(e)}
}

function kick(uid,cid){
if(!confirm('确定要踢出 '+(uid||cid)+' 并封禁？'))return;
ws.send(JSON.stringify({type:'admin_kick',target_session_id:uid,target_client_id:cid}))
}
window._kick=kick;

function unban(cid){
if(!confirm('确定要解封 '+cid.slice(0,16)+'... 吗？'))return;
ws.send(JSON.stringify({type:'admin_unban',target_client_id:cid}))
}
window._unban=unban;

function delMsg(rid,ts){
if(!rid||!ts)return;
if(!confirm('确定要删除这条消息吗？'))return;
ws.send(JSON.stringify({type:'admin_delete_message',room_id:rid,timestamp:ts}))
}
window._delMsg=delMsg;

function renderUsers(users){
userL.innerHTML='';
uc.textContent='('+users.length+')';
if(users.length===0){userL.innerHTML='<div class="empty-state">暂无在线用户</div>';ob.textContent='0 人在线';return}
var totalOnline=0;
users.forEach(function(u){
totalOnline++;
var card=document.createElement('div');card.className='user-card';
var a=u.username&&u.username[0]||'?';
var roomName=(u.room||'?').replace('room','聊天室 ');
card.innerHTML='<div class="avatar">'+a+'</div><div class="info"><div class="name">'+esc(u.username)+' <span class="tag">'+roomName+'</span></div><div class="detail"><span>'+esc((u.client_id||'').slice(0,12))+'...</span><span>'+esc(u.session_id||'')+'</span></div></div><div class="actions"><button class="ban-btn" onclick="window._kick(\''+u.session_id+'\',\''+u.client_id+'\')">封禁</button></div>';
userL.appendChild(card)
});
ob.textContent=totalOnline+' 人在线'
}

function renderMessages(msgs){
msgL.innerHTML='';
mc.textContent='('+(msgs?msgs.length:allMessages.length)+')';
if(!msgs||msgs.length===0){msgL.innerHTML='<div class="empty-state">暂无消息</div>';return}
msgs.forEach(function(m){
var el=buildMsgEl(m);
msgL.appendChild(el);
});
}

function addLiveMessage(d){
if(currentTab!=='messages')return;
// Add to in-memory array
var msg=Object.assign({},d);
allMessages=[msg].concat(allMessages);
// Re-render current view respecting search
doSearch();
}

function buildMsgEl(m){
var el=document.createElement('div');el.className='msg-item';
var t=m.timestamp?new Date(m.timestamp*1000).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'';
var roomName=(m._room_name||(m._room||'').replace('room','聊天室 '));
var msg=m.content||'';
var cid=(m.client_id||'').slice(0,12);
var flag='';
if(containsSensitive(msg))flag=' <span class="msg-flag">⚠ 敏感</span>';
el.innerHTML='<div><span class="msg-time">'+t+'</span> <span class="msg-room">'+esc(roomName)+'</span> <span class="msg-user">'+esc(m.username||'匿名')+'</span>'+flag+' <span class="msg-id">'+esc(cid||(m.session_id||'').slice(0,12))+'</span></div><div class="msg-content">'+esc(msg)+'</div><div class="msg-actions"><button class="del-btn" onclick="window._delMsg(\''+(m._room||'')+'\','+m.timestamp+')">删除</button></div>';
return el;
}

function renderBans(bans){
banL.innerHTML='';
bdc.textContent='('+(bans?bans.length:0)+')';
if(!bans||bans.length===0){banL.innerHTML='<div class="empty-state">暂无封禁记录</div>';bc.textContent='封禁 0 个';return}
bans.forEach(function(b){
var card=document.createElement('div');card.className='ban-card';
var timeStr=b.timestamp&&b.timestamp>0?new Date(b.timestamp*1000).toLocaleString('zh-CN'):'未知时间';
card.innerHTML='<div class="info"><div class="cid">'+esc(b.client_id)+'</div><div class="time">封禁时间: '+timeStr+' | 原因: '+esc(b.reason||'管理员封禁')+'</div></div><div class="actions"><button class="unban-btn" onclick="window._unban(\''+b.client_id+'\')">解封</button></div>';
banL.appendChild(card)
});
bc.textContent='封禁 '+bans.length+' 个';
}

function containsSensitive(t){
var words=['法轮功','六四','天安门','台湾独立','藏独','疆独','分裂国家','颠覆国家','邪教'];
for(var i=0;i<words.length;i++){if(t.indexOf(words[i])>=0)return true}
return false
}

function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}

// 允许从任何域名访问管理后台
connect();
})();
</script>
</body>
</html>
