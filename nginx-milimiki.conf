server {
    listen 80;
    server_name milimiki.com www.milimiki.com 121.43.59.47;

    # Security Headers (migrated from CF Worker)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' ws: wss:; media-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Rate Limiting (zone defined in nginx.conf http block)
    limit_req zone=chatroom burst=30 nodelay;
    limit_conn connlimit 20;

    # Logs
    access_log /var/log/nginx/milimiki_access.log;
    error_log /var/log/nginx/milimiki_error.log;

    # Static files
    root /opt/chatroom/deploy;
    index index.html;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location = /health {
        proxy_pass http://127.0.0.1:8766/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # WebSocket proxy
    location /ws {
        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Block sensitive paths
    location ~* /\.git {
        deny all;
        return 403;
    }
    location ~* \.env$ {
        deny all;
        return 403;
    }

    # Default - serve static HTML
    location / {
        try_files $uri $uri/ =404;
    }
}
